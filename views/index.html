<!doctype html>
<html>


<head>
    <meta charset="utf-8">
    <title>Bami tracker by Nouk</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom stylesheet -->
    <link rel="stylesheet" href="css/style.css">

</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">WhosTurn</a>

            <!-- Hamburger button (shows on small screens) -->
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#mainNav"
                    aria-controls="mainNav" aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Links (collapse into hamburger on small screens) -->
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/">Home</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        <h1>Whose turn is it?</h1>
        <p>Welcome to the climbing group turn tracker.</p>

        <!-- Current Driver -->
        <div class="card mt-4">
            <div class="card-body text-center">
                <h5 class="card-title">Driving This Week</h5>
                <p class="display-6" id="currentDriver">Loading...</p>
            </div>
        </div>

        <!-- Driving Rotation -->
        <div class="card mt-3">
            <div class="card-body">
                <h5 class="card-title">Driving Order</h5>
                <ol id="drivingOrder" class="list-group list-group-numbered list-group-flush">
                    <!-- Driving order loaded by JavaScript -->
                </ol>
            </div>
        </div>

        <!-- Member List -->
        <div class="card mt-4">
            <div class="card-body">
                <h5 class="card-title">Members</h5>
                <ul id="memberList" class="list-group list-group-flush">
                    <!-- Members will be loaded here by JavaScript -->
                </ul>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>Check out my other work.</p>
            <a href="https://www.linkedin.com/in/nouk-g-1718b9170/" target="_blank" rel="noopener"
               class=" me-3 fs-5">
                <i class="bi bi-linkedin"></i>
            </a>
            <a href="https://github.com/RubberDuckyNouk" target="_blank" rel="noopener"
               class="fs-5">
                <i class="bi bi-github"></i>
            </a>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

        <!-- App JavaScript -->
    <script src="/js/app.js"></script>

    <!-- Live reload -->
    <script src="http://localhost:35729/livereload.js"></script>

</body>
</html>
