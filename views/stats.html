<!doctype html>
<html>


<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bami tracker by Nouk</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom stylesheet -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">WhosTurn</a>

            <!-- Hamburger button (shows on small screens) -->
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#mainNav"
                    aria-controls="mainNav" aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Links (collapse into hamburger on small screens) -->
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/bitterballen">Bitterballen</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/stats">Stats</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        <h1>Climbing Stats</h1>

        <!-- Member selector -->
        <div class="card mt-4">
            <div class="card-body">
                <h5 class="card-title">Select Member</h5>
                <select id="memberSelect" class="form-select">
                    <option value="">Select member...</option>
                </select>
            </div>
        </div>

        <!-- Top 10 average -->
        <div id="topAvgCard" class="card mt-4 d-none">
            <div class="card-body text-center">
                <h5 class="card-title">Average Top 10 Grades (Last 2 Months)</h5>
                <p id="topAvgValue" class="display-6 mb-0">—</p>
            </div>
        </div>

        <!-- Chart -->
        <div class="card mt-4">
            <div class="card-body">
                <h5 class="card-title">Routes & Max Grade (Last 12 Months)</h5>
                <p id="noDataMsg" class="text-muted d-none">No climb data for this member.</p>
                <canvas id="statsChart"></canvas>
            </div>
        </div>

    </main>

    <!--Footer-->
    <footer>
        <div class="container">
            <p>
                Beer poured by
                <a href="https://yosemite.nl/" target="_blank" rel="noopener">
                    <img src="/images/YosemiteLogo.png" alt="Yosemite" style="height: 2em; vertical-align: middle;">
                </a>
            </p>
            <p>Check out my other work.</p>
            <a href="https://www.linkedin.com/in/nouk-g-1718b9170/" target="_blank" rel="noopener"
               class=" me-3 fs-5">
                <i class="bi bi-linkedin"></i>
            </a>
            <a href="https://github.com/RubberDuckyNouk" target="_blank" rel="noopener"
               class="fs-5">
                <i class="bi bi-github"></i>
            </a>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

    <!-- Stats JavaScript -->
    <script src="/js/stats.js"></script>

    <!-- Live reload -->
    <script src="http://localhost:35729/livereload.js"></script>

</body>
</html>
